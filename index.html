<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Australian ReUse — Book a Collection</title>
<meta name="description" content="Australian ReUse — Where Clothes Don't Go to Waste. Book a time with our team today.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --magenta:#B4036D;
  --magenta-dark:#8E0256;
  --magenta-light:#D4247F;
  --magenta-glow:rgba(180,3,109,.12);
  --charcoal:#1A1A2E;
  --off-white:#FAF7F9;
  --white:#FFFFFF;
  --text:#1A1A2E;
  --text-muted:#6B6B80;
  --border:#E8DFE5;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--off-white);overflow-x:hidden;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── CANVAS ── */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.35}

/* ── MAIN WRAPPER ── */
.page-wrap{position:relative;z-index:1;width:100%;max-width:700px;padding:50px 24px 40px;display:flex;flex-direction:column;align-items:center;gap:36px}

/* ── LOGO ── */
.logo-block{text-align:center}
.logo-block img{max-width:280px;width:100%;height:auto}

/* ── BOOKING CARD ── */
.booking-card{width:100%;background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px 32px 12px;box-shadow:0 8px 50px rgba(180,3,109,.06);overflow:hidden}
.booking-heading{text-align:center;margin-bottom:24px}
.booking-heading h1{font-size:22px;font-weight:700;color:var(--charcoal);margin-bottom:6px}
.booking-heading p{font-size:14px;color:var(--text-muted);line-height:1.55}
.calendly-inline-widget{border-radius:0 0 20px 20px}

/* ── FOOTER ── */
.footer{position:relative;z-index:1;text-align:center;padding:0 24px 32px}
.footer p{font-size:12px;color:var(--text-muted)}
.footer a{color:var(--magenta);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}

/* ── MOBILE ── */
@media(max-width:560px){
  .page-wrap{padding:36px 16px 28px}
  .logo-block img{max-width:220px}
  .booking-card{padding:28px 16px 8px;border-radius:16px}
  .calendly-inline-widget{min-width:280px!important;height:680px!important}
}

/* ── FADE-IN ── */
.fade-up{opacity:0;transform:translateY(18px);animation:fadeUp .7s ease forwards}
.fade-up-delay{animation-delay:.15s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<!-- Canvas Background -->
<canvas id="bgCanvas"></canvas>

<div class="page-wrap">
  <!-- LOGO -->
  <div class="logo-block fade-up">
    <img src="Australian_reuse_logo.png" alt="Australian ReUse — Where Clothes Don't Go to Waste">
  </div>

  <!-- BOOKING -->
  <div class="booking-card fade-up fade-up-delay">
    <div class="booking-heading">
      <h1>Book a Time With Our Team</h1>
      <p>Select a convenient time below and one of our team members will contact you to discuss how Australian ReUse can help with your clothing collection needs.</p>
    </div>
    <!-- Calendly inline widget begin -->
    <div class="calendly-inline-widget" data-url="https://calendly.com/collections-australianreuse?hide_landing_page_details=1&hide_gdpr_banner=1&primary_color=b4036d" style="min-width:320px;height:700px;"></div>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    <!-- Calendly inline widget end -->
  </div>
</div>

<!-- FOOTER -->
<div class="footer fade-up" style="animation-delay:.3s">
  <p>&copy; 2026 Australian ReUse. All rights reserved. &nbsp;|&nbsp; <a href="mailto:collections@australianreuse.com.au">collections@australianreuse.com.au</a></p>
</div>

<script>
/* ── ANIMATED CANVAS BACKGROUND ── */
(function(){
  var canvas = document.getElementById('bgCanvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var particleCount = 50;

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function Particle(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.35;
    this.vy = (Math.random() - 0.5) * 0.35;
    this.radius = Math.random() * 2.2 + 0.8;
    this.opacity = Math.random() * 0.25 + 0.08;
  }

  for(var i = 0; i < particleCount; i++){
    particles.push(new Particle());
  }

  function animate(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(var i = 0; i < particles.length; i++){
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      if(p.x < 0) p.x = canvas.width;
      if(p.x > canvas.width) p.x = 0;
      if(p.y < 0) p.y = canvas.height;
      if(p.y > canvas.height) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(180,3,109,' + p.opacity + ')';
      ctx.fill();

      for(var j = i + 1; j < particles.length; j++){
        var p2 = particles[j];
        var dx = p.x - p2.x;
        var dy = p.y - p2.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if(dist < 130){
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = 'rgba(180,3,109,' + (0.05 * (1 - dist / 130)) + ')';
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
</html>
